<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        background: #f4f4f4;
        color: #333;
        line-height: 1.8;
    }

    .resume-wrapper {
        display: flex;
        max-width: 900px; /* 稍微縮小寬度，視覺更集中 */
        margin: 40px auto;
        min-height: 1100px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    /* 左側欄 */
    .sidebar {
        width: 33%;
        background-color: #5d5d5d; /* 調整為更沉穩的灰色 */
        color: white;
        padding: 40px 25px;
    }

    .profile-img {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        margin-bottom: 40px;
        border-radius: 2px; /* 稍微帶點圓角 */
    }

    .sidebar h3 {
        font-size: 1.1rem;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 15px;
        border-bottom: 1px solid rgba(255,255,255,0.2);
        padding-bottom: 8px;
        margin-top: 40px;
        font-weight: 600;
    }

    .contact-info, .expertise-list {
        list-style: none;
        font-size: 0.85rem;
    }

    .contact-info li {
        margin-bottom: 18px;
    }

    .contact-info b {
        display: block;
        color: #bbb;
        font-size: 0.75rem;
        text-transform: uppercase;
        margin-bottom: 2px;
    }

    .expertise-list li {
        margin-bottom: 10px;
        padding-left: 15px;
        position: relative;
        color: #eee;
    }

    .expertise-list li::before {
        content: "";
        position: absolute;
        left: 0;
        top: 8px;
        width: 4px;
        height: 4px;
        background: #fff;
        border-radius: 50%;
    }

    /* 右側主內容 */
    .main-content {
        width: 67%;
        padding: 0; /* 移除 padding 讓頂部裝飾能貼邊 */
        background: #fff;
        position: relative;
    }

    /* 頂部裝飾背景 */
    .header-bg {
        background-color: #efefef;
        padding: 60px 50px;
        clip-path: polygon(0 0, 100% 0, 100% 80%, 0 100%); /* 仿範本斜角效果 */
    }

    .header-name h1 {
        font-size: 3.2rem;
        font-weight: 800;
        color: #333;
        letter-spacing: 2px;
    }

    .header-name p {
        font-size: 1.1rem;
        color: #777;
        letter-spacing: 5px;
        margin-top: 5px;
        text-transform: uppercase;
    }

    .content-body {
        padding: 20px 50px 50px 50px;
    }

    .section {
        margin-top: 45px;
    }

    .section-title {
        font-size: 1.25rem;
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 20px;
        letter-spacing: 2px;
        color: #333;
        position: relative;
    }

    .section-content {
        font-size: 0.95rem;
        color: #666;
        text-align: justify;
    }

    .project-item {
        margin-bottom: 25px;
    }

    .project-item h4 {
        color: #333;
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 5px;
    }

    .project-list {
        list-style: none; /* 移除預設點點 */
        color: #666;
    }

    .project-list li {
        margin-bottom: 8px;
        font-size: 0.95rem;
    }

    /* 按鈕樣式美化 */
    button {
        margin-top: 15px;
        padding: 10px 20px;
        background: #5d5d5d;
        color: white;
        border: none;
        cursor: pointer;
        font-size: 0.8rem;
        letter-spacing: 1px;
        transition: 0.3s;
    }

    button:hover {
        background: #333;
    }

    @media (max-width: 768px) {
        .resume-wrapper { flex-direction: column; margin: 0; }
        .sidebar, .main-content { width: 100%; }
        .header-bg { clip-path: none; padding: 40px 30px; }
        .content-body { padding: 30px; }
    }
</style>
